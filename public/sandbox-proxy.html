<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MCP App Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <script>
    window.addEventListener("message", function(event) {
      var inner = document.querySelector("iframe");
      if (event.source === window.parent) {
        if (event.data && event.data.type === "load-html") {
          var iframe = document.createElement("iframe");
          iframe.sandbox = "allow-scripts allow-forms";
          iframe.style.cssText = "width:100%;height:100%;border:none;";
          document.body.innerHTML = "";
          document.body.appendChild(iframe);
          iframe.srcdoc = event.data.html;
          iframe.addEventListener("load", function() {
            window.parent.postMessage({ type: "sandbox-ready" }, "*");
          });
        } else if (inner) {
          inner.contentWindow.postMessage(event.data, "*");
        }
      } else if (inner && event.source === inner.contentWindow) {
        window.parent.postMessage(event.data, "*");
      }
    });
    window.parent.postMessage({ type: "sandbox-proxy-ready" }, "*");
  </script>
</body>
</html>
